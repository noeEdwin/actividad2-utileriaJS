<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Usuario</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="registrationSection" class="container">
    <h1>Formulario de Registro</h1>
    <p class="subtitle">Complete todos los campos para crear su cuenta</p>

    <form id="registrationForm" novalidate>
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Edwin Noe" />
        <span class="error-message" id="errorNombre"></span>
      </div>

      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="Ej: usuario@ejemplo.com" />
        <span class="error-message" id="errorCorreo"></span>
      </div>

      <div class="form-group">
        <label for="fechaNacimiento">Fecha de nacimiento</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento" />
        <span class="error-message" id="errorFechaNacimiento"></span>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ej: 9511095153" />
        <span class="error-message" id="errorTelefono"></span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" />
        <span class="error-message" id="errorPassword"></span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repita su contraseña" />
        <span class="error-message" id="errorConfirmPassword"></span>
      </div>

      <button type="submit" class="btn-primary">Registrarse</button>
    </form>

    <p class="login-link">
      ¿Ya tiene cuenta? <a href="login.html">Inicie sesión aquí</a>
    </p>
  </div>

  <div id="ageModal" class="modal-overlay">
    <div class="modal-content">
      <h2>Resultado del Registro</h2>
      <p id="modalMessage"></p>
      <button id="closeModal" class="btn-primary">Cerrar</button>
    </div>
  </div>

  <script src="js/utileria.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
